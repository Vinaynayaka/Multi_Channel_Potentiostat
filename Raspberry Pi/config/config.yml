# =============================================================================
#  config.yml  —  Potentiostat Configuration
# =============================================================================
#
#  Hardware section  : Calibrate ONCE, never touch again per experiment
#  Experiment section: Only change sweep rate / voltage range / cycles
#
# =============================================================================


# ── Hardware Calibration (one-time setup) ─────────────────────────────────────

hardware:
  sample_interval_ms: 100     # Time between data points (ms) — calibrate once
  r_shunt:           214     # Shunt resistor (ohms)        — calibrate once
  adc_samples:         10     # ADC readings averaged per point — calibrate once


# ── Select Experiment: CV, LSV, or CA ─────────────────────────────────────────

experiment: CV


# ── Cyclic Voltammetry ────────────────────────────────────────────────────────
#   Change per experiment: start_voltage, vertex_1, vertex_2,
#                          end_voltage, sweep_rate, cycles, rest_time

cv:
  start_voltage:   0.0        # V
  vertex_1:        1.0        # V  (first turnover voltage)
  vertex_2:       -1.0        # V  (second turnover voltage)
  end_voltage:     0.0        # V
  sweep_rate:    100          # mV/s
  cycles:          3
  rest_time:       2          # seconds — equilibration before sweep


# ── Linear Sweep Voltammetry ──────────────────────────────────────────────────
#   Change per experiment: start_voltage, end_voltage, sweep_rate, rest_time

lsv:
  start_voltage:   0.0        # V
  end_voltage:     1.0        # V
  sweep_rate:    100          # mV/s
  rest_time:       2          # seconds


# ── Chronoamperometry ─────────────────────────────────────────────────────────
#   Change per experiment: voltage, duration, rest_time

ca:
  voltage:         0.5        # V — step voltage
  duration:       30          # seconds — how long to hold
  rest_time:       2          # seconds — equilibration at 0V before step