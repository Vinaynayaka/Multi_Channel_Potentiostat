# ── Experiment to run ──────────────────────────────────────────────────────────
experiment: CV          # CV | LSV | CA

# ── Hardware ───────────────────────────────────────────────────────────────────
# ONLY edit physical values here. All derived values (dE, data_points,
# pts/s) are computed automatically by main.py. Never put derived values
# back into this file.
hardware:
  r_shunt    : 214     # Ω  — TIA feedback / shunt resistor
  adc_samples: 10       # ADC readings averaged per point (1–20)
                        # higher → less noise, slower per point
                        # t_meas = 5 + adc_samples × 3.4 ms (100 kHz I²C)
  live_plot  : true     # true = live plot  |  false = best timing / headless
  dt         : 0.100    # s  — MASTER sampling interval
                        # must be > t_meas (main.py validates this)
                        # CV/LSV: dE = sweep_rate × dt  (≥ 1.259 mV DAC LSB)
                        # CA    : time_step = dt
                        #
                        # Quick selection guide:
                        #   adc_samples=10 → dt ≥ 0.040 s  (safe: 0.100 s)
                        #   adc_samples= 5 → dt ≥ 0.023 s  (safe: 0.050 s)
                        #   adc_samples= 2 → dt ≥ 0.012 s  (safe: 0.025 s)

# ── CV parameters ──────────────────────────────────────────────────────────────
cv:
  start_voltage : 0.0   # V
  vertex_1      : 0.5   # V
  vertex_2      : -0.5  # V
  end_voltage   : 0.0   # V
  sweep_rate    : 50    # mV/s
  cycles        : 3
  rest_time     : 5.0   # s

# ── LSV parameters ─────────────────────────────────────────────────────────────
lsv:
  start_voltage : 0.0   # V
  end_voltage   : 1.0   # V
  sweep_rate    : 50    # mV/s
  rest_time     : 5.0   # s

# ── CA parameters ──────────────────────────────────────────────────────────────
ca:
  voltage   : 0.5       # V  — step voltage
  duration  : 60.0      # s
  rest_time : 5.0       # s
  # data_points is derived: round(duration / dt) — do NOT enter manually