# ──────────────────────────────────────────────────────────────────────────────
# Multi-Channel Potentiostat — Configuration File
# ──────────────────────────────────────────────────────────────────────────────
# Edit this file to set experiment parameters before each run.
# Hardware constants (shunt resistor etc.) are fixed and live in hardware.py.
# Only experiment-specific parameters go here.


# ── Select which experiment to run ────────────────────────────────────────────
# Options: CV | LSV | CA
experiment: CV


# ── Cyclic Voltammetry (CV) ───────────────────────────────────────────────────
cv:
  start_voltage:  0.5     # V  — starting voltage
  vertex_1:       1.0     # V  — first turnover voltage
  vertex_2:       0     # V  — second turnover voltage
  end_voltage:    0.5     # V  — final voltage (usually same as start)
  sweep_rate:     50      # mV/s
  cycles:         2       # number of complete cycles
  rest_time:      2.0     # seconds to hold at start voltage before sweep
  steps_per_volt: 100     # data point density — same across all segments


# ── Linear Sweep Voltammetry (LSV) ────────────────────────────────────────────
lsv:
  start_voltage:  0.0     # V
  end_voltage:    1.0     # V
  sweep_rate:     100     # mV/s
  rest_time:      2.0     # seconds
  steps_per_volt: 150     # data point density


# ── Chronoamperometry (CA) ────────────────────────────────────────────────────
ca:
  voltage:        -1     # V  — step voltage to hold at
  duration:       30      # seconds
  rest_time:      2.0     # seconds to hold at 0V before stepping
  data_points:    150     # total number of readings over the duration


# ── Hardware constants (do not change unless you swap components) ─────────────
hardware:
  r_shunt:        214.0  # ohms — TIA feedback resistor on JUAMI board
  virtual_ground: 2.5     # V    — physical midpoint of circuit